
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>GPA Simulation</title>
  <link rel="stylesheet" href="/simModalStyles.css">
</head>
<body>
<!-- Input Modal -->
    <div id="inputModal" class="modal">
        <div class="modalContent modalLarge">
            <div class="modalHeader">
                <h2>Course Information</h2>
                <span id="closeInputBtn" class="closeBtn">&times;</span>
            </div>
            <div class="modalBody">
                <div class="target-gpa-section">
                    <label for="targetGPAInput">Target GPA:</label>
                    <input type="number" id="targetGPAInput" step="0.01" min="0" max="4.0" value="3.56">
                    <span class="gpa-hint">(0.0 - 4.0)</span>
                </div>
                
                <p>Edit grades and mark which courses are finalized (locked):</p>
                <div class="table-container">
                    <table class="course-table">
                        <thead>
                            <tr>
                                <th>Course Name</th>
                                <th>Numerical Grade</th>
                                <th>Letter Grade</th>
                                <th>Finalized</th>
                            </tr>
                        </thead>
                        <tbody id="courseTableBody">
                            <!-- Course rows will be populated here -->
                        </tbody>
                    </table>
                </div>
                <div class="modal-buttons">
                    <button id="cancelSimBtn" class="btn-secondary">Cancel</button>
                    <button id="runSimBtn" class="btn-primary">Run Simulation</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Results Modal -->
    <div id="resultsModal" class="modal">
        <div class="modalContent">
            <div class="modalHeader">
                <h2>GPA Simulation Results</h2>
                <span id="closeResultsBtn" class="closeBtn">&times;</span>
            </div>
            <div class="modalBody">
                <div id="resultsOutput">
                    <!-- Results will appear here -->
                </div>
                <div class="modal-buttons">
                    <button id="backToInputBtn" class="btn-secondary">Back to Edit</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/gpaSimulationModel.js"></script>
    </body>
</html>
